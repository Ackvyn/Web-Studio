    <script type="text/javascript">

        var STYLE_ID = 'ackvyn-tawk-hide-footer'
        var CSS_TEXT =
          '.tawk-card.tawk-card-inverse.tawk-card-xsmall.tawk-footer.tawk-flex-none,' +
          '.tawk-card.tawk-card-inverse.tawk-card-xsmall,' +
          '.tawk-footer.tawk-flex-none,' +
          '.tawk-footer{' +
          'display:none!important;' +
          'height:0!important;' +
          'min-height:0!important;' +
          'overflow:hidden!important;' +
          'padding:0!important;' +
          'margin:0!important;' +
          'border:0!important;' +
          'pointer-events:none!important;' +
          '}'

        function injectStyle(doc) {
          try {
            if (!doc || !doc.createElement) return false
            if (doc.getElementById(STYLE_ID)) return true
            var style = doc.createElement('style')
            style.id = STYLE_ID
            style.textContent = CSS_TEXT
            var target = doc.head || doc.documentElement
            if (!target) return false
            target.appendChild(style)
            return true
          } catch (e) {
            return false
          }
        }

        function walk(doc, seen) {
          if (!doc || seen.has(doc)) return
          seen.add(doc)
          injectStyle(doc)
          var frames
          try {
            frames = doc.querySelectorAll('iframe')
          } catch (e) {
            return
          }
          for (var i = 0; i < frames.length; i++) {
            var frame = frames[i]
            try {
              var child = frame.contentDocument || frame.contentWindow.document
              if (child) walk(child, seen)
            } catch (e) {
              // Cross-origin — skip
            }
            frame.addEventListener('load', function () {
              scan()
            })
          }
        }

        function scan() {
          walk(document, new WeakSet())
        }

        Tawk_API = Tawk_API || {}
        var previousOnLoad = Tawk_API.onLoad
        Tawk_API.onLoad = function () {
          if (typeof previousOnLoad === 'function') previousOnLoad()
          scan()
        }

        scan()
        setInterval(scan, 800)
        if (typeof MutationObserver !== 'undefined' && document.body) {
          new MutationObserver(function () {
            scan()
          }).observe(document.body, { childList: true, subtree: true })
        }
      })()
